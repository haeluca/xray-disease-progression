model:
  class: DDPM
  generator:
    class: DiffusionUNet
    in_channels: 1
    out_channels: 1
    condition_dim: 7
  T: 1000
  beta_start: 1e-4
  beta_end: 0.02

baseline:
  class: ConditionalVAE
  condition_dim: 7

optimizer:
  class: AdamW
  lr: 1e-4
  weight_decay: 1e-5

scheduler:
  class: CosineAnnealingLR
  T_max: 200

training:
  epochs: 1
  batch_size: 8
  num_workers: 4
  checkpoint_interval: 10
  early_stopping_patience: 30
  randomize_target_features: false

loss:
  reconstruction: mse
  condition_weight: 1.0
  use_classifier: false

data:
  image_size: 64
  num_features: 7
  train_split: data/splits/train.csv
  val_split: data/splits/val.csv
  test_split: data/splits/test.csv
  metadata_path: data/metadata.csv
  roi_dir: data/processed/normalized

paths:
  checkpoint_dir: checkpoints/project_a
  log_dir: logs/project_a
  classifier_checkpoint: checkpoints/classifier/best.pt
